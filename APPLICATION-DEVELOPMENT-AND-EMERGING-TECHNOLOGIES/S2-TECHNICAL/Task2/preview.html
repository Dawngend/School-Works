<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume of Shapes Preview</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #FDFBF7; 
            color: #0F2A5F; 
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .table-container {
            background-color: #FFFFFF;
            padding: 15px;
            border: 2px solid #0F2A5F; 
            box-shadow: 4px 4px 10px rgba(15, 42, 95, 0.1);
        }

        table {
            width: 700px;
            border-collapse: separate;
            border-spacing: 2px;
            border: 1px solid #0F2A5F;
        }

        th, td {
            border: 1px solid #0F2A5F; 
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }

        .main-title {
            font-size: 24px;
            font-weight: bold;
            padding: 15px;
            background-color: #0F2A5F; 
            color: #FDFBF7;
        }

        .sub-header th {
            font-weight: bold;
            font-size: 18px;
            background-color: #E8EDF5; 
            color: #0F2A5F;
        }

        td {
            font-size: 18px;
            background-color: #FAFAEA; 
        }
    </style>
</head>
<body>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th colspan="3" class="main-title">Volume of Shapes</th>
                </tr>
                <tr class="sub-header">
                    <th>Values</th>
                    <th>Formula</th>
                    <th>Answer</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>s = 5</td>
                    <td>V = s<sup>3</sup></td>
                    <td>125</td>
                </tr>
                <tr>
                    <td>l = 4, w = 3, h = 5</td>
                    <td>V = l &times; w &times; h</td>
                    <td>60</td>
                </tr>
                <tr>
                    <td>r = 4, h = 10</td>

                    <td>502.65</td>
                </tr>
                <tr>
                    <td>r = 3, h = 7</td>
                    <td>V = <sup>1</sup>&frasl;<sub>3</sub>&pi;r<sup>2</sup>h</td>
                    <td>65.97</td>
                </tr>
                <tr>
                    <td>r = 6</td>
                    <td>V = <sup>4</sup>&frasl;<sub>3</sub>&pi;r<sup>3</sup></td>

            </tbody>
        </table>
    </div>

</html>
